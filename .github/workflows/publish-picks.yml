name: Publish AZAI Picks

on:
  schedule:
    - cron: '23 8 * * *'  # Daily at 8:23am UTC
  workflow_dispatch: # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch picks from Google Sheets
        run: |
          RESPONSE=$(curl -sL "${{ secrets.WEBHOOK_URL }}")
          echo "$RESPONSE" > /tmp/picks.json
          echo "Fetched picks data"
          cat /tmp/picks.json | head -200

      - name: Generate pick pages
        run: |
          python3 << 'PYEOF'
          import json, os, html, re
          from datetime import datetime

          # ─── Helpers ───────────────────────────────────────────────
          def safe_round(val, decimals=2):
              """Round numeric values safely, return 'N/A' on failure."""
              if val in ('N/A', None, ''):
                  return 'N/A'
              try:
                  return round(float(val), decimals)
              except:
                  return val

          def verdict_class(verdict):
              if 'Great' in str(verdict): return 'great'
              if 'Good' in str(verdict): return 'good'
              if 'Fair' in str(verdict): return 'fair'
              return 'bad'

          def parse_date(timestamp):
              try:
                  return datetime.fromisoformat(str(timestamp).replace('Z', '+00:00')).strftime('%B %d, %Y')
              except:
                  return str(timestamp)[:10]

          def parse_date_short(timestamp):
              try:
                  return datetime.fromisoformat(str(timestamp).replace('Z', '+00:00')).strftime('%b %d, %Y')
              except:
                  return str(timestamp)[:10]

          VERDICT_DESC = {
              'Great Deal': 'Trading at a significant discount to intrinsic value.',
              'Good Deal': 'Priced below its true value. Odds are in your favor.',
              'Fair Deal': 'Roughly fairly priced. Not much margin for error.',
              'Bad Deal': 'Overpriced relative to what the business is worth.',
          }

          # ─── Load new picks ────────────────────────────────────────
          with open('/tmp/picks.json') as f:
              data = json.load(f)

          picks = data.get('picks', [])
          if not picks:
              print("No new picks to publish")
              exit(0)

          os.makedirs('picks', exist_ok=True)
          published = []

          # ─── Generate individual report pages ──────────────────────
          for pick in picks:
              rd = pick.get('reportData', pick)
              ticker = rd.get('ticker', 'UNKNOWN')
              slug = ticker.lower().replace('.', '-')
              is_etf = rd.get('type') == 'etf'
              name = rd.get('companyName', ticker)
              verdict = rd.get('verdict', 'N/A')
              verdict_desc = rd.get('verdictDescription', VERDICT_DESC.get(verdict, ''))
              timestamp = rd.get('timestamp', pick.get('timestamp', datetime.now().isoformat()))
              date_str = parse_date(timestamp)
              vc = verdict_class(verdict)

              # ── Compute & round all metrics ──
              price = safe_round(rd.get('currentPrice'))
              if is_etf:
                  yld = safe_round(rd.get('yield'), 2)
                  expense = safe_round(rd.get('expenseRatio'), 2)
                  score = safe_round(rd.get('score'), 0)
                  beta = safe_round(rd.get('beta'), 2)
                  total_assets = rd.get('totalAssets', 'N/A')
              else:
                  iv = safe_round(rd.get('intrinsicValue'))
                  eps_val = safe_round(rd.get('eps'))
                  pe = safe_round(rd.get('peRatio'), 1)
                  bv = safe_round(rd.get('bookValue'))
                  mos = safe_round(rd.get('marginOfSafety'), 1)
                  # Compute P/E from price/EPS if missing
                  if pe == 'N/A' and price != 'N/A' and eps_val not in ('N/A', 0):
                      try: pe = round(float(price) / float(eps_val), 1)
                      except: pass
                  # Compute IV from MoS if missing
                  if iv == 'N/A' and mos != 'N/A' and price != 'N/A':
                      try:
                          m = float(mos)
                          iv = round(float(price) / (1 + abs(m) / 100), 2) if m < 0 else round(float(price) * (1 + m / 100), 2)
                      except: pass

              # ── Build hero metrics (the big verdict banner) ──
              if is_etf:
                  hero_metrics = f'''
                  <div class="hero-banner">
                    <div class="hero-left">
                      <div class="hero-price-label">Current Price</div>
                      <div class="hero-price">${price}</div>
                    </div>
                    <div class="hero-center">
                      <span class="verdict-pill verdict-{vc}">{html.escape(verdict)}</span>
                      <div class="verdict-desc">{html.escape(verdict_desc)}</div>
                    </div>
                    <div class="hero-right">
                      <div class="hero-price-label">AZAI Score</div>
                      <div class="hero-iv">{score}<span class="score-max">/100</span></div>
                    </div>
                  </div>'''
              else:
                  # Determine if undervalued
                  try:
                      is_under = float(price) < float(iv)
                  except:
                      is_under = False
                  arrow = '&#9660;' if is_under else '&#9650;'
                  arrow_cls = 'arrow-under' if is_under else 'arrow-over'
                  hero_metrics = f'''
                  <div class="hero-banner">
                    <div class="hero-left">
                      <div class="hero-price-label">Current Price</div>
                      <div class="hero-price">${price}</div>
                    </div>
                    <div class="hero-center">
                      <span class="verdict-pill verdict-{vc}">{html.escape(verdict)}</span>
                      <div class="verdict-desc">{html.escape(verdict_desc)}</div>
                    </div>
                    <div class="hero-right">
                      <div class="hero-price-label">Intrinsic Value</div>
                      <div class="hero-iv">${iv}</div>
                    </div>
                  </div>
                  <div class="mos-bar">
                    <div class="mos-label">Margin of Safety <strong>{mos}%</strong></div>
                    <div class="mos-track"><div class="mos-fill mos-{vc}" style="width:{min(abs(float(mos) if mos != 'N/A' else 0), 100)}%"></div></div>
                  </div>'''

              # ── Detail metrics grid ──
              if is_etf:
                  sb = rd.get('scoreBreakdown', {})
                  details_html = f'''
                  <div class="detail-grid">
                    <div class="detail-card"><div class="detail-label">Yield</div><div class="detail-val">{yld}%</div></div>
                    <div class="detail-card"><div class="detail-label">Expense Ratio</div><div class="detail-val">{expense}%</div></div>
                    <div class="detail-card"><div class="detail-label">Beta</div><div class="detail-val">{beta}</div></div>
                    <div class="detail-card"><div class="detail-label">Total Assets</div><div class="detail-val">{total_assets}</div></div>
                  </div>'''
                  # Score breakdown bars
                  if sb:
                      details_html += '<div class="breakdown"><h3>Score Breakdown</h3>'
                      for key, label, icon in [('costScore','Cost Efficiency','&#128176;'),('performanceScore','Performance','&#128200;'),('yieldScore','Yield','&#128181;'),('sizeScore','Size & Liquidity','&#127974;'),('diversificationScore','Diversification','&#127760;')]:
                          val = safe_round(sb.get(key, 0), 0)
                          bar_cls = 'great' if float(val) >= 75 else 'good' if float(val) >= 50 else 'fair' if float(val) >= 25 else 'bad'
                          details_html += f'<div class="bar-row"><span class="bar-icon">{icon}</span><span class="bar-label">{label}</span><div class="bar-track"><div class="bar-fill bar-{bar_cls}" style="width:{val}%"></div></div><span class="bar-val">{val}</span></div>'
                      details_html += '</div>'
                  # Top holdings
                  holdings = rd.get('topHoldings', [])
                  if holdings:
                      details_html += '<div class="holdings"><h3>Top Holdings</h3><div class="holdings-list">'
                      for h in holdings[:10]:
                          hname = html.escape(str(h.get('name', h.get('symbol', '?'))))
                          hweight = safe_round(h.get('weight', h.get('percentage', 0)), 2)
                          details_html += f'<div class="holding-row"><span class="holding-name">{hname}</span><span class="holding-weight">{hweight}%</span></div>'
                      details_html += '</div></div>'
              else:
                  details_html = f'''
                  <div class="detail-grid">
                    <div class="detail-card"><div class="detail-label">EPS</div><div class="detail-val">${eps_val}</div></div>
                    <div class="detail-card"><div class="detail-label">P/E Ratio</div><div class="detail-val">{pe}</div></div>
                    <div class="detail-card"><div class="detail-label">Book Value</div><div class="detail-val">${bv}</div></div>
                    <div class="detail-card"><div class="detail-label">Margin of Safety</div><div class="detail-val">{mos}%</div></div>
                  </div>'''

              # ── AI analysis sections with icons ──
              ai = rd.get('aiAnalysis', {})
              ai_html = ""
              if ai:
                  section_config = [
                      ('whatDoTheyDo', 'What They Do', '&#127970;'),
                      ('whatTheyDo', 'What They Do', '&#127970;'),
                      ('moat', 'Competitive Moat', '&#127984;'),
                      ('moneyMachine', 'The Money Machine', '&#128176;'),
                      ('management', 'Management', '&#128100;'),
                      ('cashFlow', 'Cash Flow', '&#128178;'),
                      ('valuation', 'Valuation', '&#128200;'),
                      ('deal', 'The Deal', '&#129309;'),
                      ('risks', 'Key Risks', '&#9888;&#65039;'),
                      ('worthBuying', 'Worth Buying?', '&#129300;'),
                      ('futureOutlook', 'Future Outlook', '&#128302;'),
                      ('bottomLine', 'Bottom Line', '&#127919;'),
                      ('overview', 'Overview', '&#128218;'),
                      ('strategy', 'Strategy', '&#127919;'),
                      ('holdings', 'Top Holdings', '&#128188;'),
                      ('performance', 'Performance', '&#128200;'),
                      ('costs', 'Costs', '&#128176;'),
                      ('suitability', 'Suitability', '&#127919;'),
                  ]
                  seen_titles = set()
                  for key, title, icon in section_config:
                      if key in ai and ai[key] and title not in seen_titles:
                          seen_titles.add(title)
                          ai_html += f'<div class="ai-section"><div class="ai-title"><span class="ai-icon">{icon}</span><h3>{title}</h3></div><p>{html.escape(str(ai[key]))}</p></div>'

              page_title = f"{ticker} {'ETF' if is_etf else 'Stock'} Analysis - {verdict} | AZAI Oracle"
              page_desc = f"AZAI Oracle analysis of {html.escape(name)} ({ticker}). Verdict: {verdict}. {'ETF composite score and breakdown.' if is_etf else f'Intrinsic value ${iv}.'}"

              page_html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{page_title}</title>
            <meta name="description" content="{page_desc}">
            <meta name="robots" content="index, follow">
            <link rel="canonical" href="https://azai.ca/picks/{slug}.html">
            <meta property="og:title" content="{page_title}">
            <meta property="og:description" content="{page_desc}">
            <meta property="og:url" content="https://azai.ca/picks/{slug}.html">
            <meta property="og:type" content="article">
            <script type="application/ld+json">
            {{{{
              "@context": "https://schema.org",
              "@type": "Article",
              "headline": "{ticker} Analysis - {verdict}",
              "description": "{page_desc}",
              "datePublished": "{timestamp}",
              "publisher": {{{{ "@type": "Organization", "name": "AZAI Oracle" }}}},
              "url": "https://azai.ca/picks/{slug}.html"
            }}}}
            </script>
            <link rel="icon" type="image/png" href="/favicon.png">
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
            <style>
              * {{{{ margin:0; padding:0; box-sizing:border-box; }}}}
              body {{{{ font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:#FAF8F5; color:#1a1a2e; line-height:1.6; -webkit-font-smoothing:antialiased; }}}}

              /* Nav */
              nav {{{{ display:flex; align-items:center; justify-content:space-between; padding:16px 40px; background:#1a1a2e; }}}}
              .nav-logo {{{{ display:flex; align-items:center; gap:10px; text-decoration:none; }}}}
              .nav-logo img {{{{ height:32px; width:32px; }}}}
              .nav-logo span {{{{ color:#FAF8F5; font-size:1.1rem; font-weight:600; }}}}
              .nav-logo span em {{{{ font-style:normal; color:#D4A574; }}}}
              .nav-links a {{{{ color:rgba(250,248,245,0.7); text-decoration:none; margin-left:28px; font-size:0.85rem; }}}}
              .nav-links a:hover {{{{ color:#D4A574; }}}}

              /* Report container */
              .report {{{{ max-width:720px; margin:0 auto; padding:48px 24px; }}}}

              /* Header */
              .report-header {{{{ margin-bottom:12px; }}}}
              .report-date {{{{ font-size:0.72rem; color:#D4A574; text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:8px; }}}}
              .report-header h1 {{{{ font-size:2rem; font-weight:800; letter-spacing:-1px; margin-bottom:8px; }}}}
              .badges {{{{ display:flex; gap:8px; align-items:center; margin-bottom:4px; }}}}
              .ticker-badge {{{{ display:inline-block; background:#f0ede8; padding:3px 12px; border-radius:6px; font-size:0.78rem; font-weight:700; color:#D4A574; }}}}
              .etf-badge {{{{ background:#e6f9ee; color:#16a34a; }}}}

              /* Hero verdict banner */
              .hero-banner {{{{ display:flex; align-items:center; justify-content:space-between; background:#1a1a2e; border-radius:16px; padding:32px; margin:24px 0 16px; }}}}
              .hero-left, .hero-right {{{{ text-align:center; min-width:120px; }}}}
              .hero-price-label {{{{ font-size:0.68rem; text-transform:uppercase; letter-spacing:1px; color:rgba(250,248,245,0.5); margin-bottom:4px; }}}}
              .hero-price {{{{ font-size:1.6rem; font-weight:800; color:#FAF8F5; }}}}
              .hero-iv {{{{ font-size:1.6rem; font-weight:800; color:#D4A574; }}}}
              .score-max {{{{ font-size:0.9rem; font-weight:500; color:rgba(212,165,116,0.6); }}}}
              .hero-center {{{{ text-align:center; flex:1; padding:0 20px; }}}}
              .verdict-pill {{{{ display:inline-block; padding:6px 20px; border-radius:24px; font-size:0.85rem; font-weight:700; }}}}
              .verdict-great {{{{ background:rgba(22,163,74,0.2); color:#4ade80; }}}}
              .verdict-good {{{{ background:rgba(34,197,94,0.2); color:#86efac; }}}}
              .verdict-fair {{{{ background:rgba(202,138,4,0.2); color:#fbbf24; }}}}
              .verdict-bad {{{{ background:rgba(220,38,38,0.2); color:#fca5a5; }}}}
              .verdict-desc {{{{ font-size:0.78rem; color:rgba(250,248,245,0.45); margin-top:8px; font-weight:400; }}}}

              /* Margin of safety bar */
              .mos-bar {{{{ margin-bottom:24px; }}}}
              .mos-label {{{{ font-size:0.78rem; color:#888; margin-bottom:6px; }}}}
              .mos-label strong {{{{ color:#1a1a2e; }}}}
              .mos-track {{{{ height:6px; background:#f0ede8; border-radius:3px; overflow:hidden; }}}}
              .mos-fill {{{{ height:100%; border-radius:3px; transition:width 0.5s; }}}}
              .mos-great {{{{ background:#16a34a; }}}}
              .mos-good {{{{ background:#22c55e; }}}}
              .mos-fair {{{{ background:#ca8a04; }}}}
              .mos-bad {{{{ background:#dc2626; }}}}

              /* Detail metrics grid */
              .detail-grid {{{{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }}}}
              .detail-card {{{{ background:#fff; border:1px solid #eee; border-radius:10px; padding:16px; text-align:center; }}}}
              .detail-label {{{{ font-size:0.65rem; text-transform:uppercase; letter-spacing:0.5px; color:#aaa; margin-bottom:4px; }}}}
              .detail-val {{{{ font-size:1.05rem; font-weight:700; color:#1a1a2e; }}}}

              /* Score breakdown */
              .breakdown {{{{ background:#fff; border:1px solid #eee; border-radius:14px; padding:24px; margin-bottom:24px; }}}}
              .breakdown h3 {{{{ font-size:0.82rem; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin-bottom:16px; }}}}
              .bar-row {{{{ display:flex; align-items:center; margin-bottom:12px; gap:10px; }}}}
              .bar-icon {{{{ font-size:1rem; width:24px; text-align:center; }}}}
              .bar-label {{{{ font-size:0.82rem; color:#555; width:130px; flex-shrink:0; font-weight:500; }}}}
              .bar-track {{{{ flex:1; height:8px; background:#f0ede8; border-radius:4px; overflow:hidden; }}}}
              .bar-fill {{{{ height:100%; border-radius:4px; }}}}
              .bar-great {{{{ background:#16a34a; }}}}
              .bar-good {{{{ background:#22c55e; }}}}
              .bar-fair {{{{ background:#ca8a04; }}}}
              .bar-bad {{{{ background:#dc2626; }}}}
              .bar-val {{{{ font-size:0.82rem; font-weight:700; color:#1a1a2e; width:30px; text-align:right; }}}}

              /* Holdings */
              .holdings {{{{ background:#fff; border:1px solid #eee; border-radius:14px; padding:24px; margin-bottom:24px; }}}}
              .holdings h3 {{{{ font-size:0.82rem; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin-bottom:16px; }}}}
              .holding-row {{{{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f5f3f0; }}}}
              .holding-row:last-child {{{{ border-bottom:none; }}}}
              .holding-name {{{{ font-size:0.85rem; color:#555; }}}}
              .holding-weight {{{{ font-size:0.85rem; font-weight:600; color:#1a1a2e; }}}}

              /* AI sections */
              .ai-section {{{{ background:#fff; border:1px solid #eee; border-radius:14px; padding:24px 28px; margin-bottom:14px; }}}}
              .ai-title {{{{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }}}}
              .ai-icon {{{{ font-size:1.2rem; }}}}
              .ai-section h3 {{{{ font-size:0.95rem; font-weight:700; color:#1a1a2e; }}}}
              .ai-section p {{{{ font-size:0.88rem; color:#555; line-height:1.7; }}}}

              /* CTA */
              .cta-box {{{{ text-align:center; padding:48px 32px; margin:36px 0; background:#1a1a2e; border-radius:16px; }}}}
              .cta-box p {{{{ color:rgba(250,248,245,0.5); margin-bottom:16px; font-size:0.9rem; }}}}
              .cta-btn {{{{ display:inline-block; background:#D4A574; color:#1a1a2e; padding:14px 36px; border-radius:10px; font-weight:700; text-decoration:none; font-size:0.95rem; }}}}

              /* Footer */
              .disclaimer {{{{ text-align:center; padding:20px 24px; background:#f0ede8; font-size:0.72rem; color:#aaa; }}}}
              .disclaimer a {{{{ color:#D4A574; }}}}
              footer {{{{ text-align:center; padding:28px 24px; color:#bbb; font-size:0.8rem; background:#1a1a2e; }}}}
              footer a {{{{ color:#D4A574; text-decoration:none; }}}}

              @media (max-width:768px) {{{{
                nav {{{{ padding:14px 20px; }}}}
                .report-header h1 {{{{ font-size:1.5rem; }}}}
                .hero-banner {{{{ flex-direction:column; gap:20px; padding:24px; }}}}
                .detail-grid {{{{ grid-template-columns:repeat(2,1fr); }}}}
                .bar-label {{{{ width:100px; }}}}
              }}}}
            </style>
          </head>
          <body>
            <nav>
              <a href="/" class="nav-logo"><img src="/logo_dark.png" alt="AZAI Oracle"><span>AZAI <em>Oracle</em></span></a>
              <div class="nav-links"><a href="/picks/">Picks</a><a href="/privacy.html">Privacy</a><a href="/support.html">Support</a></div>
            </nav>
            <article class="report">
              <div class="report-header">
                <div class="report-date">AZAI Oracle Report &mdash; {date_str}</div>
                <h1>{html.escape(name)}</h1>
                <div class="badges">
                  <span class="ticker-badge">{ticker}</span>
                  {'<span class="ticker-badge etf-badge">ETF</span>' if is_etf else ''}
                </div>
              </div>
              {hero_metrics}
              {details_html}
              {ai_html}
              <div class="cta-box">
                <p>Get real-time analysis with the AZAI Oracle app</p>
                <a href="https://play.google.com/store/apps/details?id=com.azai.valueinvestor" class="cta-btn">Download AZAI Oracle</a>
              </div>
            </article>
            <div class="disclaimer">AZAI Oracle is for informational purposes only. Not financial advice. <a href="/terms.html">Terms</a>.</div>
            <footer><p>&copy; 2026 AZAI Oracle &middot; <a href="/privacy.html">Privacy</a> &middot; <a href="/terms.html">Terms</a> &middot; asoni@kancanada.com</p></footer>
          </body>
          </html>"""

              filepath = f"picks/{slug}.html"
              with open(filepath, 'w') as f:
                  f.write(page_html)
              published.append(ticker)
              print(f"Published: {filepath}")

          # ─── Update sitemap (scan ALL existing pick files, deduplicated) ─────────
          today = datetime.now().strftime('%Y-%m-%d')
          sitemap_entries = []
          seen_urls = set()
          for f in sorted(os.listdir('picks')):
              if f.endswith('.html') and f != 'index.html':
                  url = f'https://azai.ca/picks/{f}'
                  if url not in seen_urls:
                      seen_urls.add(url)
                      sitemap_entries.append(f'  <url>\n    <loc>{url}</loc>\n    <lastmod>{today}</lastmod>\n    <changefreq>weekly</changefreq>\n    <priority>0.7</priority>\n  </url>')

          with open('sitemap.xml', 'r') as f:
              sitemap = f.read()

          # Remove ALL pick URLs (including /picks/ index and individual pages)
          sitemap = re.sub(r'\s*<url>\s*<loc>https://azai\.ca/picks/[^<]*</loc>.*?</url>', '', sitemap, flags=re.DOTALL)
          # Re-add picks index + deduplicated individual pages
          if sitemap_entries:
              insert_point = sitemap.rfind('</urlset>')
              picks_index = f'  <url>\n    <loc>https://azai.ca/picks/</loc>\n    <lastmod>{today}</lastmod>\n    <changefreq>daily</changefreq>\n    <priority>0.9</priority>\n  </url>'
              new_sitemap = sitemap[:insert_point] + picks_index + '\n' + '\n'.join(sitemap_entries) + '\n' + sitemap[insert_point:]
              with open('sitemap.xml', 'w') as f:
                  f.write(new_sitemap)

          # ─── Build picks index from ALL existing HTML files (preserves old picks) ──
          all_picks_data = []
          for fname in sorted(os.listdir('picks'), reverse=True):
              if not fname.endswith('.html') or fname == 'index.html':
                  continue
              slug_name = fname.replace('.html', '')
              fpath = os.path.join('picks', fname)
              with open(fpath, 'r') as ef:
                  ehtml = ef.read()
              # Extract metadata from the generated page
              title_m = re.search(r'<h1>(.*?)</h1>', ehtml)
              ticker_m = re.search(r'<span class="ticker-badge">(\w+)</span>', ehtml)
              verdict_m = re.search(r'<span class="verdict-pill verdict-(\w+)">(.*?)</span>', ehtml)
              date_m = re.search(r'AZAI Oracle Report &mdash; (.*?)</div>', ehtml)
              price_m = re.search(r'hero-price">\$([\d.]+)', ehtml)
              iv_m = re.search(r'hero-iv">\$([\d.]+)', ehtml)
              score_m = re.search(r'hero-iv">([\d.]+)<span class="score-max">', ehtml)
              etf_m = re.search(r'etf-badge', ehtml)

              t = ticker_m.group(1) if ticker_m else slug_name.upper()
              n = title_m.group(1) if title_m else slug_name.upper()
              v = verdict_m.group(2) if verdict_m else 'N/A'
              vc2 = verdict_m.group(1) if verdict_m else 'bad'
              ds = date_m.group(1) if date_m else ''
              p = price_m.group(1) if price_m else 'N/A'
              is_e = bool(etf_m)

              if is_e:
                  sc = score_m.group(1) if score_m else 'N/A'
                  sub = f"Score: {sc}/100"
              else:
                  iv_val = iv_m.group(1) if iv_m else ''
                  sub = f"Intrinsic Value: ${iv_val}" if iv_val else ''

              all_picks_data.append({
                  'ticker': t, 'slug': slug_name, 'name': n, 'verdict': v, 'vc': vc2,
                  'price': p, 'date': ds, 'is_etf': is_e, 'sub': sub,
              })

          # ── Generate picks/index.html with ALL picks ──
          cards_html = ""
          for pd in all_picks_data:
              cards_html += f'''<a href="/picks/{pd['slug']}.html" class="pick-card">
                <div class="pick-top"><span class="pick-ticker">{pd['ticker']}</span><span class="pick-date">{pd['date']}</span></div>
                <div class="pick-name">{html.escape(pd['name'])}</div>
                <div class="pick-sub">${pd['price']} &middot; {pd['sub']}</div>
                <span class="verdict-pill verdict-{pd['vc']}">{pd['verdict']}</span>
              </a>\n'''

          index_html = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AZAI Picks - Top-Rated Stock & ETF Analyses | AZAI Oracle</title>
            <meta name="description" content="Browse top-rated stock and ETF analyses from AZAI Oracle users. Intrinsic value, AI insights, and verdicts.">
            <link rel="canonical" href="https://azai.ca/picks/">
            <link rel="icon" type="image/png" href="/favicon.png">
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
            <style>
              * {{{{ margin:0; padding:0; box-sizing:border-box; }}}}
              body {{{{ font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:#FAF8F5; color:#1a1a2e; line-height:1.6; }}}}
              nav {{{{ display:flex; align-items:center; justify-content:space-between; padding:16px 40px; background:#1a1a2e; }}}}
              .nav-logo {{{{ display:flex; align-items:center; gap:10px; text-decoration:none; }}}}
              .nav-logo img {{{{ height:32px; width:32px; }}}}
              .nav-logo span {{{{ color:#FAF8F5; font-size:1.1rem; font-weight:600; }}}}
              .nav-logo span em {{{{ font-style:normal; color:#D4A574; }}}}
              .nav-links a {{{{ color:rgba(250,248,245,0.7); text-decoration:none; margin-left:28px; font-size:0.85rem; }}}}
              .container {{{{ max-width:800px; margin:0 auto; padding:48px 24px; }}}}
              h1 {{{{ font-size:1.6rem; margin-bottom:8px; }}}}
              .subtitle {{{{ color:#888; margin-bottom:32px; }}}}
              .picks-grid {{{{ display:grid; gap:16px; }}}}
              .pick-card {{{{ display:block; background:#fff; border:1px solid #eee; border-radius:12px; padding:20px; text-decoration:none; color:inherit; transition:box-shadow 0.2s; }}}}
              .pick-card:hover {{{{ box-shadow:0 4px 16px rgba(0,0,0,0.08); }}}}
              .pick-top {{{{ display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }}}}
              .pick-ticker {{{{ font-weight:700; color:#D4A574; font-size:0.9rem; }}}}
              .pick-date {{{{ font-size:0.72rem; color:#aaa; }}}}
              .pick-name {{{{ font-size:1.05rem; font-weight:600; margin-bottom:4px; }}}}
              .pick-sub {{{{ font-size:0.82rem; color:#666; margin-bottom:8px; }}}}
              .verdict-pill {{{{ display:inline-block; padding:3px 12px; border-radius:16px; font-size:0.75rem; font-weight:600; }}}}
              .verdict-great {{{{ background:#e6f9ee; color:#16a34a; }}}}
              .verdict-good {{{{ background:#e6f9ee; color:#22c55e; }}}}
              .verdict-fair {{{{ background:#fef9e7; color:#ca8a04; }}}}
              .verdict-bad {{{{ background:#fee; color:#dc2626; }}}}
              footer {{{{ text-align:center; padding:28px 24px; color:#bbb; font-size:0.8rem; background:#1a1a2e; margin-top:60px; }}}}
              footer a {{{{ color:#D4A574; text-decoration:none; }}}}
            </style>
          </head>
          <body>
            <nav>
              <a href="/" class="nav-logo"><img src="/logo_dark.png" alt="AZAI"><span>AZAI <em>Oracle</em></span></a>
              <div class="nav-links"><a href="/picks/">Picks</a><a href="/privacy.html">Privacy</a><a href="/support.html">Support</a></div>
            </nav>
            <div class="container">
              <h1>AZAI Picks</h1>
              <p class="subtitle">Top-rated analyses from AZAI Oracle users</p>
              <div class="picks-grid">{cards_html}</div>
            </div>
            <footer><p>&copy; 2026 AZAI Oracle &middot; <a href="/privacy.html">Privacy</a> &middot; <a href="/terms.html">Terms</a></p></footer>
          </body>
          </html>'''
          with open('picks/index.html', 'w') as f:
              f.write(index_html)
          print("Updated picks/index.html with ALL picks")

          # ─── Update homepage picks section (use comment markers for safe replacement) ──
          if all_picks_data:
              homepage_cards = ""
              for pd in all_picks_data[:6]:
                  homepage_cards += f'''      <a href="/picks/{pd['slug']}.html" class="pick-card">
                <div class="pick-header"><span class="pick-ticker">{pd['ticker']}</span><span class="pick-date">{pd['date']}</span><span class="verdict verdict-{pd['vc']}">{pd['verdict']}</span></div>
                <div class="pick-name">{html.escape(pd['name'])}</div>
                <div class="pick-metrics">${pd['price']} &middot; {pd['sub']}</div>
              </a>\n'''

              with open('index.html', 'r') as f:
                  homepage = f.read()

              # Match the entire picks-grid div by finding the closing </div> that's
              # followed by the picks-cta div (unique landmark), not just the first </div>
              homepage = re.sub(
                  r'<div class="picks-grid" id="picks-grid">.*?</div>\s*(?=<div class="picks-cta">)',
                  f'<div class="picks-grid" id="picks-grid">\n{homepage_cards}    </div>\n    ',
                  homepage, flags=re.DOTALL
              )

              with open('index.html', 'w') as f:
                  f.write(homepage)
              print("Updated homepage with latest 6 picks")

          print(f"\nPublished {len(published)} new picks: {[p for p in published]}")
          PYEOF

      - name: Mark published in Google Sheets
        if: success()
        run: |
          # Mark picks as published by calling the webhook
          for ticker in $(python3 -c "
          import json
          with open('/tmp/picks.json') as f:
              data = json.load(f)
          for p in data.get('picks', []):
              print(p.get('reportData', p).get('ticker', ''))
          "); do
            curl -sL -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"markPublished\",\"ticker\":\"$ticker\"}" || true
          done

      - name: Commit and push
        run: |
          git config user.name "AZAI Bot"
          git config user.email "bot@azai.ca"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-publish AZAI Picks $(date +%Y-%m-%d)"
            git push
          fi
